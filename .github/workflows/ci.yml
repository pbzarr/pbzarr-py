name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.66.0
          frozen: true

      - run: pixi run lint
      - run: pixi run fmt-check
      - run: pixi run typecheck
      - run: pixi run test
